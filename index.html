<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<title>Teker Pro Max</title>
<link rel="icon" href="favicon.ico" type="image/x-icon"/>
<link rel="shortcut icon" href="favicon.ico" type="image/x-icon"/>
<style>
:root {
  --primary: #4CAF50;
  --accent: #ff4757;
  --glass: rgba(255, 255, 255, 0.15);
  --glass-border: rgba(255, 255, 255, 0.3);
  --text-dark: #2f3542;
}
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: #1a1a1a;
  background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('./assets/background.jpg') no-repeat center center fixed;
  background-size: cover;
  color: white;
}
#container {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  gap: 80px;
  padding: 20px;
}
#wheel-outer-ring {
  position: relative;
  padding: 15px;
  background: rgba(255, 255, 255, 0.05);
  border-radius: 50%;
  box-shadow: 0 0 50px rgba(0,0,0,0.5);
  border: 4px solid var(--glass-border);
}
#wheel-container {
  position: relative;
  width: 600px;
  height: 600px;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
}
canvas {
  width: 600px;
  height: 600px;
  border-radius: 50%;
  background: transparent;
  z-index: 1;
  pointer-events: none;
  transform: translateZ(0);
}
#pointer {
  position: absolute;
  top: 50%;
  right: -20px;
  transform: translateY(-50%);
  width: 60px;
  height: 40px;
  z-index: 10;
  filter: drop-shadow(0 0 10px rgba(255, 71, 87, 0.8));
}
#pointer::after {
  content: '';
  position: absolute;
  right: 0;
  border-top: 20px solid transparent;
  border-bottom: 20px solid transparent;
  border-right: 40px solid var(--accent);
}
#history {
  background: var(--glass);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  padding: 30px;
  border-radius: 24px;
  width: 320px;
  height: 600px;
  display: flex;
  flex-direction: column;
  border: 1px solid var(--glass-border);
}
#history h3 {
  margin: 0 0 20px 0;
  text-align: center;
  font-weight: 600;
  text-transform: uppercase;
  font-size: 1.1rem;
  border-bottom: 1px solid var(--glass-border);
  padding-bottom: 15px;
}
#history-list {
  list-style: none;
  padding: 0;
  margin: 0;
  overflow-y: auto;
  flex-grow: 1;
}
