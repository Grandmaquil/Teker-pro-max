<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Teker Pro Max</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon"/>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon"/>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
      background: url('./assets/background.jpg') no-repeat center center fixed;
      background-size: cover;
    }
    #container {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 60px;
    }
    #wheel-container {
      position: relative;
      width: 600px;
      height: 600px;
      cursor: pointer;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: transparent;
      z-index: 1;
    }
    #pointer {
      position: absolute;
      top: 50%;
      right: -35px;
      transform: translateY(-50%) rotate(-180deg);
      width: 0;
      height: 0;
      border-top: 25px solid transparent;
      border-bottom: 25px solid transparent;
      border-left: 35px solid red;
      z-index: 10;
    }
    #history {
      background: rgba(255, 255, 255, 0.9);
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      max-height: 500px;
      overflow-y: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }
    #history h3 { margin-top: 0; text-align:center; }
    #popup {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.5);
      justify-content: center;
      align-items: center;
      z-index: 999;
    }
    #popup-content {
      background: white;
      padding: 30px 40px;
      border-radius: 10px;
      font-size: 24px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

<div id="container">
  <div id="wheel-container">
    <canvas id="wheelCanvas" width="600" height="600"></canvas>
    <div id="pointer" title="Pointer"></div>
  </div>

  <div id="history">
    <h3>Son Seçilenler</h3>
    <ul id="history-list"></ul>
  </div>
</div>

<div id="popup">
  <div id="popup-content">
    <div id="popup-text">Seçilen: İSİM</div>
    <button onclick="closePopup()">TAMAM</button>
  </div>
</div>

<script>
const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
const popup = document.getElementById('popup');
const popupText = document.getElementById('popup-text');
const historyList = document.getElementById('history-list');

let names = [];
let spinDuration = 5;
let musicDuration = 10;
let spinSoundVariants = 44;
let isSpinning = false;
let rotation = 0;
const maxHistory = 10;

let currentAudio = null;
let soundTimeout = null;
let spinSound = null;

/* ✅ BUILT-IN NAMES (your names.txt content) */
const builtInText = `10,10,44
55 Dağaşan
121 Çam
122 Korucuoğlu
123 Avşar
124 Kaya,,2
125 Mutlu
126 Güçlü
127 Zengin,,2
128 Işık
129 Ağlık
130 Dinçoğlu
131 Camcıoğlu
132 Camadan,,5
133 Moroğlu
134 Tüfekçi
135 Başarır
136 Karadoğan
137 Soylu
138 Esen,,3
139 Aykut
140 Yazıcı
141 Demir
142 Bıçakçı
143 Yaman
144 Bedir
145 Ayaz
146 Kara
147 Narin
148 Uşun
149 Taran
150 Gül`;

function parseNamesText(text) {
  const lines = text.trim().split('\n').map(l => l.trim()).filter(Boolean);
  if (lines.length === 0) return;

  const firstParts = lines[0].split(',').map(s => s.trim());

  if (firstParts.length >= 1 && !isNaN(parseFloat(firstParts[0])))
    spinDuration = parseFloat(firstParts[0]);
  if (firstParts.length >= 2 && !isNaN(parseFloat(firstParts[1])))
    musicDuration = parseFloat(firstParts[1]);
  if (firstParts.length >= 3 && !isNaN(parseInt(firstParts[2], 10)))
    spinSoundVariants = parseInt(firstParts[2], 10);

  const arr = [];
  for (let i = 1; i < lines.length; i++) {
    const parts = lines[i].split(',').map(s => s.trim());
    const name = parts[0];
    const message = (parts.length >= 2 && parts[1] !== '') ? parts[1] : name;
    let variants = 1;
    if (parts.length >= 3 && !isNaN(parseInt(parts[2], 10))) {
      variants = parseInt(parts[2], 10);
      if (variants < 1) variants = 1;
    }
    arr.push({ name, message, variants });
  }
  names = arr;
}

parseNamesText(builtInText);

/* === EVERYTHING BELOW IS UNCHANGED === */

const wheelImage = new Image();
wheelImage.src = './assets/wheel.jpg';
wheelImage.onload = () => drawWheel(rotation);

function drawWheel(angleDeg) {
  const w = canvas.width, h = canvas.height;
  const cx = w/2, cy = h/2;
  const radius = Math.min(cx, cy);
  ctx.clearRect(0, 0, w, h);

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angleDeg * Math.PI / 180);
  ctx.translate(-cx, -cy);

  if (wheelImage.complete && wheelImage.naturalWidth !== 0)
    ctx.drawImage(wheelImage, 0, 0, w, h);

  if (!names || names.length === 0) {
    ctx.restore();
    return;
  }

  const segmentAngle = (2 * Math.PI) / names.length;

  for (let i = 0; i < names.length; i++) {
    const start = i * segmentAngle;
    const end = start + segmentAngle;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, radius, start, end);
    ctx.closePath();
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  for (let i = 0; i < names.length; i++) {
    const start = i * segmentAngle;
    const textAngle = start + segmentAngle / 2;
    const textRadius = radius - 80;
    const tx = cx + textRadius * Math.cos(textAngle);
    const ty = cy + textRadius * Math.sin(textAngle);

    ctx.save();
    ctx.translate(tx, ty);
    ctx.rotate(textAngle);
    const arcLen = Math.max(20, textRadius * segmentAngle);
    const fontSize = Math.max(14, Math.min(50, arcLen * 0.48));
    ctx.font = `${Math.round(fontSize)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.lineWidth = Math.max(2, Math.round(fontSize * 0.12));
    ctx.strokeStyle = 'rgba(0,0,0,0.9)';
    ctx.fillStyle = '#ffffff';
    ctx.strokeText(names[i].name, 0, 0);
    ctx.fillText(names[i].name, 0, 0);
    ctx.restore();
  }

  ctx.restore();
}

drawWheel(rotation);
</script>
</body>
</html>
