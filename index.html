<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Teker Pro Max</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon"/>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon"/>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
      background: url('./assets/background.jpg') no-repeat center center fixed;
      background-size: cover;
    }
    #container {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 60px;
    }
    #wheel-container {
      position: relative;
      width: 600px;
      height: 600px;
      cursor: pointer;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: transparent;
      z-index: 1;
    }
    #pointer {
      position: absolute;
      top: 50%;
      right: -35px;
      transform: translateY(-50%) rotate(-180deg);
      width: 0;
      height: 0;
      border-top: 25px solid transparent;
      border-bottom: 25px solid transparent;
      border-left: 35px solid red;
      z-index: 10;
    }
    #history {
      background: rgba(255, 255, 255, 0.9);
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      max-height: 500px;
      overflow-y: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }
    #history h3 { margin-top: 0; text-align:center; }
    #popup {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.5);
      justify-content: center;
      align-items: center;
      z-index: 999;
    }
    #popup-content {
      background: white;
      padding: 30px 40px;
      border-radius: 10px;
      font-size: 24px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

<div id="container">
  <div id="wheel-container">
    <canvas id="wheelCanvas" width="600" height="600"></canvas>
    <div id="pointer"></div>
  </div>

  <div id="history">
    <h3>Son Seçilenler</h3>
    <ul id="history-list"></ul>
  </div>
</div>

<div id="popup">
  <div id="popup-content">
    <div id="popup-text">Seçilen: İSİM</div>
    <button onclick="closePopup()">TAMAM</button>
  </div>
</div>

<script>
const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
const popup = document.getElementById('popup');
const popupText = document.getElementById('popup-text');
const historyList = document.getElementById('history-list');

let names = [];
let spinDuration = 5;
let musicDuration = 15;
let spinSoundVariants = 1;
let isSpinning = false;
let rotation = 0;
const maxHistory = 10;

let currentAudio = null;
let soundTimeout = null;
let spinSound = null;

// Wheel image
const wheelImage = new Image();
wheelImage.src = './assets/wheel.jpg';
wheelImage.onload = () => drawWheel(rotation);

// 🔒 FIXED NAMES DATA (NO UPLOAD)
const FIXED_NAMES_TEXT = `
10,10,44
55 Dağaşan
121 Çam
122 Korucuoğlu
123 Avşar
124 Kaya,,2
125 Mutlu
126 Güçlü
127 Zengin,,2
128 Işık
129 Ağlık
130 Dinçoğlu
131 Camcıoğlu
132 Camadan,,5
133 Moroğlu
134 Tüfekçi
135 Başarır
136 Karadoğan
137 Soylu
138 Esen,,3
139 Aykut
140 Yazıcı
141 Demir
142 Bıçakçı
143 Yaman
144 Bedir
145 Ayaz
146 Kara
147 Narin
148 Uşun
149 Taran
150 Gül
`;

// SAME parser, reused
function parseNamesText(text) {
  const lines = text.trim().split('\n').map(l => l.trim()).filter(Boolean);
  const firstParts = lines[0].split(',').map(s => s.trim());

  if (!isNaN(firstParts[0])) spinDuration = parseFloat(firstParts[0]);
  if (!isNaN(firstParts[1])) musicDuration = parseFloat(firstParts[1]);
  if (!isNaN(firstParts[2])) spinSoundVariants = parseInt(firstParts[2], 10);

  const arr = [];
  for (let i = 1; i < lines.length; i++) {
    const parts = lines[i].split(',').map(s => s.trim());
    const name = parts[0];
    const message = parts[1] || name;
    let variants = 1;
    if (parts[2] && !isNaN(parts[2])) variants = Math.max(1, parseInt(parts[2], 10));
    arr.push({ name, message, variants });
  }
  names = arr;
  drawWheel(rotation);
}

// Load fixed data immediately
parseNamesText(FIXED_NAMES_TEXT);

function drawWheel(angleDeg) {
  const w = canvas.width, h = canvas.height;
  const cx = w/2, cy = h/2;
  const radius = Math.min(cx, cy);
  ctx.clearRect(0, 0, w, h);

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angleDeg * Math.PI / 180);
  ctx.translate(-cx, -cy);

  ctx.drawImage(wheelImage, 0, 0, w, h);

  const seg = (2 * Math.PI) / names.length;
  ctx.strokeStyle = 'white';
  ctx.lineWidth = 2;

  for (let i = 0; i < names.length; i++) {
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, radius, i * seg, (i + 1) * seg);
    ctx.stroke();
  }

  for (let i = 0; i < names.length; i++) {
    const a = i * seg + seg / 2;
    const r = radius - 80;
    ctx.save();
    ctx.translate(cx + r * Math.cos(a), cy + r * Math.sin(a));
    ctx.rotate(a);
    ctx.font = '22px sans-serif';
    ctx.fillStyle = 'white';
    ctx.strokeStyle = 'black';
    ctx.lineWidth = 3;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeText(names[i].name, 0, 0);
    ctx.fillText(names[i].name, 0, 0);
    ctx.restore();
  }

  ctx.restore();
}

function showPopup(obj) {
  popupText.textContent = `Seçilen: ${obj.message}`;
  popup.style.display = 'flex';
  const li = document.createElement('li');
  li.textContent = obj.name;
  historyList.prepend(li);
  while (historyList.children.length > maxHistory)
    historyList.removeChild(historyList.lastChild);
}

function closePopup() {
  popup.style.display = 'none';
  if (currentAudio) currentAudio.pause();
}

function playStudentSound(obj) {
  let file = obj.variants > 1
    ? `./sounds/${obj.name}${crypto.getRandomValues(new Uint32Array(1))[0] % obj.variants + 1}.mp3`
    : `./sounds/${obj.name}.mp3`;

  const audio = new Audio(file);
  currentAudio = audio;

  audio.onerror = () => {
    currentAudio = new Audio('./sounds/Default.mp3');
    currentAudio.play();
  };

  audio.play();
}

canvas.addEventListener('click', () => {
  if (isSpinning) return;
  isSpinning = true;

  const i = crypto.getRandomValues(new Uint32Array(1))[0] % names.length;
  const obj = names[i];

  const spins = 6;
  const seg = 360 / names.length;
  const target = spins * 360 + (360 - (i + 0.5) * seg);

  const start = rotation;
  const end = start + target;
  const startTime = performance.now();

  spinSound = new Audio('./sounds/Spin.mp3');
  spinSound.loop = true;
  spinSound.play().catch(()=>{});

  function anim(t) {
    const p = Math.min((t - startTime) / (spinDuration * 1000), 1);
    rotation = start + (end - start) * (1 - Math.pow(1 - p, 3));
    drawWheel(rotation);
    if (p < 1) requestAnimationFrame(anim);
    else {
      spinSound.pause();
      isSpinning = false;
      showPopup(obj);
      playStudentSound(obj);
    }
  }
  requestAnimationFrame(anim);
});

drawWheel(rotation);
</script>
</body>
