<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<title>Teker Pro Max</title>
<link rel="icon" href="favicon.ico" type="image/x-icon"/>
<link rel="shortcut icon" href="favicon.ico" type="image/x-icon"/>
<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: sans-serif;
  background: url('./assets/background.jpg') no-repeat center center fixed;
  background-size: cover;
}
#container {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  gap: 60px;
}
#wheel-container {
  position: relative;
  width: 600px;
  height: 600px;
  cursor: pointer;
}
canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  background: transparent;
  z-index: 1;
}
#pointer {
  position: absolute;
  top: 50%;
  right: -35px;
  transform: translateY(-50%) rotate(-180deg);
  width: 0;
  height: 0;
  border-top: 25px solid transparent;
  border-bottom: 25px solid transparent;
  border-left: 35px solid red;
  z-index: 10;
}
#history {
  background: rgba(255, 255, 255, 0.9);
  padding: 20px;
  border-radius: 10px;
  width: 300px;
  max-height: 500px;
  overflow-y: auto;
  box-shadow: 0 0 10px rgba(0,0,0,0.3);
}
#history h3 { margin-top: 0; text-align:center; }
#popup {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.5);
  justify-content: center;
  align-items: center;
  z-index: 999;
}
#popup-content {
  background: white;
  padding: 30px 40px;
  border-radius: 10px;
  font-size: 24px;
  text-align: center;
  box-shadow: 0 5px 20px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div id="container">
  <div id="wheel-container">
    <canvas id="wheelCanvas" width="600" height="600"></canvas>
    <div id="pointer" title="Pointer"></div>
  </div>
  <div id="history">
    <h3>Son Seçilenler</h3>
    <ul id="history-list"></ul>
  </div>
</div>

<div id="popup">
  <div id="popup-content">
    <div id="popup-text">Seçilen: İSİM</div>
    <button onclick="closePopup()">TAMAM</button>
  </div>
</div>

<script>
const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
const popup = document.getElementById('popup');
const popupText = document.getElementById('popup-text');
const historyList = document.getElementById('history-list');

let spinDuration = 10;
let musicDuration = 10;
let spinSoundVariants = 44;
let isSpinning = false;
let rotation = 0;
const maxHistory = 10;

let currentAudio = null;
let soundTimeout = null;
let spinSound = null;

/* ✅ BUILT-IN NAMES (from your names.txt) */
let names = [
{ name:"55 Dağaşan", message:"55 Dağaşan", variants:1 },
{ name:"121 Çam", message:"121 Çam", variants:1 },
{ name:"122 Korucuoğlu", message:"122 Korucuoğlu", variants:1 },
{ name:"123 Avşar", message:"123 Avşar", variants:1 },
{ name:"124 Kaya", message:"124 Kaya", variants:2 },
{ name:"125 Mutlu", message:"125 Mutlu", variants:1 },
{ name:"126 Güçlü", message:"126 Güçlü", variants:1 },
{ name:"127 Zengin", message:"127 Zengin", variants:2 },
{ name:"128 Işık", message:"128 Işık", variants:1 },
{ name:"129 Ağlık", message:"129 Ağlık", variants:1 },
{ name:"130 Dinçoğlu", message:"130 Dinçoğlu", variants:1 },
{ name:"131 Camcıoğlu", message:"131 Camcıoğlu", variants:1 },
{ name:"132 Camadan", message:"132 Camadan", variants:5 },
{ name:"133 Moroğlu", message:"133 Moroğlu", variants:1 },
{ name:"134 Tüfekçi", message:"134 Tüfekçi", variants:1 },
{ name:"135 Başarır", message:"135 Başarır", variants:1 },
{ name:"136 Karadoğan", message:"136 Karadoğan", variants:1 },
{ name:"137 Soylu", message:"137 Soylu", variants:1 },
{ name:"138 Esen", message:"138 Esen", variants:3 },
{ name:"139 Aykut", message:"139 Aykut", variants:1 },
{ name:"140 Yazıcı", message:"140 Yazıcı", variants:1 },
{ name:"141 Demir", message:"141 Demir", variants:1 },
{ name:"142 Bıçakçı", message:"142 Bıçakçı", variants:1 },
{ name:"143 Yaman", message:"143 Yaman", variants:1 },
{ name:"144 Bedir", message:"144 Bedir", variants:1 },
{ name:"145 Ayaz", message:"145 Ayaz", variants:1 },
{ name:"146 Kara", message:"146 Kara", variants:1 },
{ name:"147 Narin", message:"147 Narin", variants:1 },
{ name:"148 Uşun", message:"148 Uşun", variants:1 },
{ name:"149 Taran", message:"149 Taran", variants:1 },
{ name:"150 Gül", message:"150 Gül", variants:1 }
];

/* EVERYTHING BELOW IS 100% UNCHANGED */

const wheelImage = new Image();
wheelImage.src = './assets/wheel.jpg';
wheelImage.onload = () => drawWheel(rotation);

function drawWheel(angleDeg) {
  const w = canvas.width, h = canvas.height;
  const cx = w/2, cy = h/2;
  const radius = Math.min(cx, cy);
  ctx.clearRect(0, 0, w, h);

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angleDeg * Math.PI / 180);
  ctx.translate(-cx, -cy);

  if (wheelImage.complete && wheelImage.naturalWidth !== 0)
    ctx.drawImage(wheelImage, 0, 0, w, h);
  else {
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fillStyle = '#f2f2f2';
    ctx.fill();
  }

  const segmentAngle = (2 * Math.PI) / names.length;
  ctx.lineWidth = 2;
  ctx.strokeStyle = 'white';

  for (let i = 0; i < names.length; i++) {
    const start = i * segmentAngle;
    const end = start + segmentAngle;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, radius, start, end);
    ctx.closePath();
    ctx.stroke();
  }

  for (let i = 0; i < names.length; i++) {
    const start = i * segmentAngle;
    const textAngle = start + segmentAngle / 2;
    const textRadius = radius - 80;
    const tx = cx + textRadius * Math.cos(textAngle);
    const ty = cy + textRadius * Math.sin(textAngle);

    ctx.save();
    ctx.translate(tx, ty);
    ctx.rotate(textAngle);
    const arcLen = Math.max(20, textRadius * segmentAngle);
    const fontSize = Math.max(14, Math.min(50, arcLen * 0.48));
    ctx.font = `${Math.round(fontSize)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.lineWidth = Math.max(2, Math.round(fontSize * 0.12));
    ctx.strokeStyle = 'rgba(0,0,0,0.9)';
    ctx.fillStyle = '#ffffff';
    ctx.strokeText(names[i].name, 0, 0);
    ctx.fillText(names[i].name, 0, 0);
    ctx.restore();
  }

  ctx.restore();
}

/* Spin + sound system untouched */
canvas.addEventListener('click', () => {
  if (isSpinning) return;
  isSpinning = true;

  const randomArr = new Uint32Array(1);
  crypto.getRandomValues(randomArr);
  const selectedIndex = randomArr[0] % names.length;
  const selectedObj = names[selectedIndex];

  const spins = Math.floor(Math.random() * 3) + 5;
  const anglePerSegmentDeg = 360 / names.length;
  const centerAngleDeg = (selectedIndex + 0.5) * anglePerSegmentDeg;
  const currentRotMod = ((rotation % 360) + 360) % 360;
  const needed = (360 - ((centerAngleDeg + currentRotMod) % 360)) % 360;
  const totalRotation = spins * 360 + needed;

  const startRot = rotation;
  const endRot = startRot + totalRotation;
  const startTime = performance.now();

  function animate(now) {
    const elapsed = (now - startTime) / 1000;
    const progress = Math.min(elapsed / spinDuration, 1);
    const ease = 1 - Math.pow(1 - progress, 3);
    rotation = startRot + (endRot - startRot) * ease;
    drawWheel(rotation);

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      rotation = endRot;
      drawWheel(rotation);
      isSpinning = false;
      popupText.textContent = `Seçilen: ${selectedObj.message}`;
      popup.style.display = 'flex';
    }
  }

  requestAnimationFrame(animate);
});

function closePopup() {
  popup.style.display = 'none';
}

drawWheel(rotation);
</script>
</body>
</html>
